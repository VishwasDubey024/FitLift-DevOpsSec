name: FitLift CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Test the Backend
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'
      - name: Install Backend Deps
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run Django Tests
        run: |
          cd backend
          python3 manage.py test

  # JOB 2: Build the Frontend
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install Frontend Deps
        run: |
          cd frontend
          npm install
      - name: Build React App
        run: |
          cd frontend
          npm run build