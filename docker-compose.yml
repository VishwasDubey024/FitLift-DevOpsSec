version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    restart: always
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=1

  frontend:
    build: ./frontend
    ports:
      - "80:5173"
    restart: always
    stdin_open: true 
    depends_on:
      - backend